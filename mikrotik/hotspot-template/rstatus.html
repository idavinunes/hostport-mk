<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="0; url=$(link-status)">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portal Wi-Fi | Redirecionando</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="portal-shell portal-shell-compact">
    <main class="status-card">
      <div class="brand-badge">Portal Wi-Fi</div>
      <h1 class="status-title">Sessao ja autenticada</h1>
      <p class="status-copy">
        Voce ja esta conectado. Estamos abrindo a pagina de status da sua sessao.
      </p>
      <div class="button-row">
        <a class="button button-primary" href="$(link-status)">Abrir status</a>
      </div>
    </main>
  </body>
</html>
